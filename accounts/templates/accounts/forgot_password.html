{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>{% block title %}MediSense AI{% endblock %}</title><link rel="stylesheet" href="{% static 'accounts/css/style.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'accounts/favicon.svg' %}">
</head>
<body class="auth-body">
<div class="auth-card">
    <div style="text-align:center;font-size:48px;margin-bottom:10px;">🔑</div>
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your registered email to receive an OTP</p>
    {% if messages %}<div class="messages-box">{% for m in messages %}<div class="alert alert-{{ m.tags }}">{{ m }}</div>{% endfor %}</div>{% endif %}
    <form method="POST">{% csrf_token %}
        <div class="form-group"><label>Registered Email</label>{{ form.email }}</div>
        <button type="submit" class="btn-primary">Send OTP</button>
        <div class="auth-link"><a href="{% url 'login' %}">← Back to Login</a></div>
    </form>
</div>
</body></html>
